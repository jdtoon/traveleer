# =============================================================================
# docker-compose.yml вЂ” Single compose file for dev and production
# =============================================================================
# Dev (default):   docker compose up
# Production:      docker compose --profile production up
#
# All config comes from environment variables (set in .env or host env).
# Copy .env.example в†’ .env and fill in real values for production.
# =============================================================================

services:
  app:
    container_name: saas-app
    build:
      context: ./src
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:8080"
    env_file:
      - path: .env
        required: false
    volumes:
      - app-data:/app/db
    environment:
      # в”Ђв”Ђ Core в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_HTTP_PORTS=8080
      # в”Ђв”Ђ Database (defaults from Dockerfile) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - ConnectionStrings__CoreDatabase=Data Source=/app/db/core.db
      - ConnectionStrings__AuditDatabase=Data Source=/app/db/audit.db
      - Tenancy__DatabasePath=/app/db/tenants
      # в”Ђв”Ђ Site в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Site__BaseUrl=${Site__BaseUrl:-http://localhost:8080}
      - Site__Name=${Site__Name:-SaaS App (Local)}
      - Site__SupportEmail=${Site__SupportEmail:-support@localhost}
      # в”Ђв”Ђ Super Admin в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - SuperAdmin__Email=${SuperAdmin__Email:-admin@localhost}
      # в”Ђв”Ђ Billing (Paystack) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Billing__Provider=${Billing__Provider:-Mock}
      - Billing__Currency=${Billing__Currency:-ZAR}
      - Billing__Paystack__SecretKey=${Billing__Paystack__SecretKey:-}
      - Billing__Paystack__PublicKey=${Billing__Paystack__PublicKey:-}
      - Billing__Paystack__WebhookSecret=${Billing__Paystack__WebhookSecret:-}
      - Billing__Paystack__CallbackBaseUrl=${Billing__Paystack__CallbackBaseUrl:-http://localhost:8080}
      # в”Ђв”Ђ Billing (Tax) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Billing__Tax__Rate=${Billing__Tax__Rate:-0.15}
      - Billing__Tax__Label=${Billing__Tax__Label:-VAT}
      - Billing__Tax__Included=${Billing__Tax__Included:-true}
      # в”Ђв”Ђ Billing (Company вЂ” for invoices) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Billing__Company__Name=${Billing__Company__Name:-}
      - Billing__Company__Address=${Billing__Company__Address:-}
      - Billing__Company__VatNumber=${Billing__Company__VatNumber:-}
      # в”Ђв”Ђ Billing (Invoice) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Billing__Invoice__Prefix=${Billing__Invoice__Prefix:-INV}
      - Billing__Invoice__PaymentTermDays=${Billing__Invoice__PaymentTermDays:-7}
      # в”Ђв”Ђ Billing (Trial & Grace Period) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Billing__Trial__DefaultDays=${Billing__Trial__DefaultDays:-14}
      - Billing__GracePeriod__Days=${Billing__GracePeriod__Days:-3}
      - Billing__GracePeriod__DunningAttempts=${Billing__GracePeriod__DunningAttempts:-3}
      - Billing__GracePeriod__DunningIntervalHours=${Billing__GracePeriod__DunningIntervalHours:-72}
      # в”Ђв”Ђ Billing (Feature Toggles) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Billing__Features__AnnualBilling=${Billing__Features__AnnualBilling:-true}
      - Billing__Features__PerSeatBilling=${Billing__Features__PerSeatBilling:-false}
      - Billing__Features__UsageBilling=${Billing__Features__UsageBilling:-false}
      - Billing__Features__AddOns=${Billing__Features__AddOns:-false}
      - Billing__Features__Discounts=${Billing__Features__Discounts:-true}
      - Billing__Features__SetupFees=${Billing__Features__SetupFees:-false}
      # в”Ђв”Ђ Email в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Email__Provider=${Email__Provider:-Console}
      - Email__FromAddress=${Email__FromAddress:-no-reply@localhost}
      - Email__FromName=${Email__FromName:-SaaS App}
      - Email__MailerSend__ApiToken=${Email__MailerSend__ApiToken:-}
      # в”Ђв”Ђ Bot Protection (Cloudflare Turnstile) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Turnstile__Provider=${Turnstile__Provider:-Mock}
      - Turnstile__SiteKey=${Turnstile__SiteKey:-}
      - Turnstile__SecretKey=${Turnstile__SecretKey:-}
      # в”Ђв”Ђ Storage (Cloudflare R2) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Storage__Provider=${Storage__Provider:-Local}
      - Storage__LocalBasePath=${Storage__LocalBasePath:-/app/db/uploads}
      - Storage__R2Bucket=${Storage__R2Bucket:-}
      - Storage__R2Endpoint=${Storage__R2Endpoint:-}
      - Storage__R2AccessKey=${Storage__R2AccessKey:-}
      - Storage__R2SecretKey=${Storage__R2SecretKey:-}
      - Storage__R2PublicUrl=${Storage__R2PublicUrl:-}
      # в”Ђв”Ђ Litestream в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Litestream__Enabled=${Litestream__Enabled:-true}
      - Litestream__LitestreamConfigPath=/app/db/litestream.yml
      - Litestream__SentinelPath=/app/db/.litestream-reload
      - Litestream__R2Bucket=${R2_BUCKET:-saas-backups}
      - Litestream__R2Endpoint=${R2_ENDPOINT:-}
      - Litestream__AutoRestoreEnabled=${Litestream__AutoRestoreEnabled:-true}
      - Litestream__KeyBackupEnabled=${Litestream__KeyBackupEnabled:-true}
      - Litestream__KeyBackupInterval=${Litestream__KeyBackupInterval:-1h}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      # в”Ђв”Ђ Dev Seeding (ignored when ASPNETCORE_ENVIRONMENT != Development) в”Ђ
      - DevSeed__Enabled=${DevSeed__Enabled:-true}
      - DevSeed__TenantSlug=${DevSeed__TenantSlug:-demo}
      - DevSeed__AdminEmail=${DevSeed__AdminEmail:-admin@demo.local}
      - DevSeed__MemberEmail=${DevSeed__MemberEmail:-member@demo.local}
      - DevSeed__PlanSlug=${DevSeed__PlanSlug:-starter}
      # в”Ђв”Ђ Health Check в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - HealthCheck__AllowedIPs=${HealthCheck__AllowedIPs:-}
      # в”Ђв”Ђ Messaging (MassTransit / RabbitMQ) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Messaging__Provider=${Messaging__Provider:-RabbitMQ}
      - Messaging__RabbitMQ__Host=${Messaging__RabbitMQ__Host:-rabbitmq}
      - Messaging__RabbitMQ__Username=${Messaging__RabbitMQ__Username:-guest}
      - Messaging__RabbitMQ__Password=${Messaging__RabbitMQ__Password:-guest}
      # в”Ђв”Ђ Caching (Redis) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Caching__Provider=${Caching__Provider:-Redis}
      - Caching__Redis__ConnectionString=${Caching__Redis__ConnectionString:-redis:6379}
      # в”Ђв”Ђ Hangfire в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Hangfire__Storage=${Hangfire__Storage:-SQLite}
      - Hangfire__SQLitePath=${Hangfire__SQLitePath:-/app/db/hangfire.db}
      - Hangfire__WorkerCount=${Hangfire__WorkerCount:-2}
      # в”Ђв”Ђ Rate Limiting в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - RateLimiting__GlobalPerMinute=${RateLimiting__GlobalPerMinute:-100}
      - RateLimiting__StrictPerMinute=${RateLimiting__StrictPerMinute:-5}
      - RateLimiting__RegistrationPerWindow=${RateLimiting__RegistrationPerWindow:-3}
      - RateLimiting__RegistrationWindowMinutes=${RateLimiting__RegistrationWindowMinutes:-5}
      # в”Ђв”Ђ Seq (structured logging) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Seq__Url=${Seq__Url:-http://seq:5341}
      # в”Ђв”Ђ Infrastructure (Super Admin dashboards) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      - Infrastructure__SeqUrl=${Infrastructure__SeqUrl:-http://seq:80}
      - Infrastructure__RabbitMqManagementUrl=${Infrastructure__RabbitMqManagementUrl:-http://rabbitmq:15672}
      - Infrastructure__UptimeKumaUrl=${Infrastructure__UptimeKumaUrl:-http://uptime-kuma:3001}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # в”Ђв”Ђ Redis (caching) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  redis:
    image: redis:7-alpine
    container_name: saas-redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # в”Ђв”Ђ RabbitMQ (messaging) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: saas-rabbitmq
    ports:
      - "127.0.0.1:${RABBITMQ_PORT:-5672}:5672"
      - "127.0.0.1:${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${Messaging__RabbitMQ__Username:-guest}
      RABBITMQ_DEFAULT_PASS: ${Messaging__RabbitMQ__Password:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # в”Ђв”Ђ Seq (structured log viewer) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  seq:
    image: datalust/seq:2025.2
    container_name: saas-seq
    ports:
      - "127.0.0.1:${SEQ_PORT:-5341}:5341"    # ingestion API
      - "127.0.0.1:${SEQ_UI_PORT:-8081}:80"   # web UI
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    volumes:
      - seq-data:/data
    restart: unless-stopped

  # в”Ђв”Ђ Uptime Kuma (uptime monitoring) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: saas-uptime-kuma
    ports:
      - "127.0.0.1:${KUMA_PORT:-3001}:3001"
    volumes:
      - kuma-data:/app/data
    restart: unless-stopped

  # в”Ђв”Ђ Litestream sidecar (production only) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Start with: docker compose --profile production up
  litestream:
    image: litestream/litestream:0.5
    container_name: saas-litestream
    profiles:
      - production
    restart: unless-stopped
    volumes:
      - app-data:/app/db
      - ./litestream-wrapper.sh:/usr/local/bin/litestream-wrapper.sh:ro
    environment:
      - LITESTREAM_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID is required for Litestream}
      - LITESTREAM_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY is required for Litestream}
    entrypoint: /bin/sh
    command: /usr/local/bin/litestream-wrapper.sh
    depends_on:
      app:
        condition: service_healthy

volumes:
  app-data:
  redis-data:
  rabbitmq-data:
  seq-data:
  kuma-data:
