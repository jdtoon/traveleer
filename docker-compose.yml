services:
  app:
    container_name: saas-app
    build:
      context: ./src
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    volumes:
      - app-data:/app/db
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_HTTP_PORTS=8080
      # ── Site ────────────────────────────────────────────────
      - Site__BaseUrl=https://your-domain.com
      - Site__Name=Your SaaS
      - Site__SupportEmail=support@your-domain.com
      # ── Super Admin ─────────────────────────────────────────
      - SuperAdmin__Email=admin@your-domain.com
      # ── Feature Flags ───────────────────────────────────────
      - FeatureFlags__AllEnabledLocally=false
      # ── Billing (Paystack) ──────────────────────────────────
      - Billing__Provider=Paystack
      - Billing__Paystack__SecretKey=CHANGE_ME
      - Billing__Paystack__PublicKey=CHANGE_ME
      - Billing__Paystack__WebhookSecret=CHANGE_ME
      - Billing__Paystack__CallbackBaseUrl=https://your-domain.com
      # ── Email (MailerSend) ───────────────────────────────────
      - Email__Provider=MailerSend
      - Email__FromAddress=noreply@your-domain.com
      - Email__FromName=Your SaaS
      - Email__MailerSend__ApiToken=CHANGE_ME
      # ── Bot Protection (Cloudflare Turnstile) ───────────────
      - Turnstile__Provider=Cloudflare
      - Turnstile__SiteKey=CHANGE_ME
      - Turnstile__SecretKey=CHANGE_ME
      # ── Storage (Cloudflare R2) ─────────────────────────────
      - Storage__Provider=R2
      - Storage__R2Bucket=CHANGE_ME
      - Storage__R2Endpoint=CHANGE_ME
      - Storage__R2AccessKey=CHANGE_ME
      - Storage__R2SecretKey=CHANGE_ME
      - Storage__R2PublicUrl=CHANGE_ME
      # ── Backup (Litestream R2 — also used by litestream sidecar) ─
      - Backup__R2Bucket=${R2_BUCKET:-saas-backups}
      - Backup__R2Endpoint=${R2_ENDPOINT:-}
      # ── Health Check ────────────────────────────────────────
      - HealthCheck__AllowedIPs=
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  litestream:
    image: litestream/litestream:0.5
    container_name: saas-litestream
    restart: unless-stopped
    volumes:
      - app-data:/app/db
      - ./litestream-wrapper.sh:/usr/local/bin/litestream-wrapper.sh:ro
    environment:
      - LITESTREAM_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - LITESTREAM_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_BUCKET=${R2_BUCKET:-saas-backups}
    entrypoint: /bin/sh
    command: /usr/local/bin/litestream-wrapper.sh
    depends_on:
      app:
        condition: service_healthy

volumes:
  app-data:
