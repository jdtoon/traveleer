<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Too Many Requests</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; color: #333; }
        .container { text-align: center; padding: 2rem; max-width: 480px; }
        h1 { font-size: 4rem; margin: 0; color: #f59e0b; }
        h2 { font-size: 1.5rem; margin: 0.5rem 0 1rem; }
        p { font-size: 1.125rem; margin: 1rem 0; color: #666; }
        .retry-info { background: #fef3c7; border: 1px solid #fcd34d; border-radius: 0.5rem; padding: 1rem; margin: 1.5rem 0; }
        .retry-info p { margin: 0; font-size: 0.9rem; color: #92400e; }
        a { color: #6366f1; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .btn { display: inline-block; background: #6366f1; color: white; padding: 0.625rem 1.5rem; border-radius: 0.375rem; margin-top: 1rem; text-decoration: none; }
        .btn:hover { background: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>429</h1>
        <h2>Too Many Requests</h2>
        <p>You've made too many requests in a short period. Please wait a moment before trying again.</p>
        <div class="retry-info">
            <p>Our rate limits help keep the service fast and reliable for everyone. Your access will be restored automatically — just wait a minute and try again.</p>
        </div>
        <a href="javascript:history.back()" class="btn">← Go Back</a>
    </div>
</body>
</html>
