<h2>You've been invited!</h2>
<p><strong>{{InviterEmail}}</strong> has invited you to join <strong>{{TenantName}}</strong>.</p>
@if (!string.IsNullOrEmpty("{{RoleName}}"))
{
    <p>You'll be assigned the <strong>{{RoleName}}</strong> role.</p>
}
<p style="text-align: center; margin: 32px 0;">
    <a href="{{AcceptUrl}}" class="btn">Accept Invitation</a>
</p>
<p style="font-size: 13px; color: #666;">This invitation expires on {{ExpiresAt}}.</p>
