<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; }
        .header { background: #1a1a2e; padding: 24px 32px; text-align: center; }
        .header h1 { color: #fff; margin: 0; font-size: 20px; font-weight: 600; }
        .body { padding: 32px; }
        .footer { padding: 24px 32px; text-align: center; font-size: 12px; color: #999; border-top: 1px solid #eee; }
        .btn { display: inline-block; padding: 12px 32px; background: #6366f1; color: #fff; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 14px; }
        .btn:hover { background: #4f46e5; }
        p { line-height: 1.6; margin: 0 0 16px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{AppName}}</h1>
        </div>
        <div class="body">
            {{Content}}
        </div>
        <div class="footer">
            <p>&copy; {{Year}} {{AppName}}. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
